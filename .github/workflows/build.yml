name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: pip install setuptools build

      - name: Build egg and wheel
        run: |
          python setup.py bdist_egg
          python -m build
          ls -alh dist/

      - name: Get egg filename
        id: egg
        run: |
          EGG_FILE=$(ls dist/*.egg)
          echo "path=${EGG_FILE}" >> $GITHUB_OUTPUT
          echo "name=$(basename ${EGG_FILE})" >> $GITHUB_OUTPUT

      - name: Get wheel filename
        id: wheel
        run: |
          WHL_FILE=$(ls dist/*.whl)
          echo "path=${WHL_FILE}" >> $GITHUB_OUTPUT
          echo "name=$(basename ${WHL_FILE})" >> $GITHUB_OUTPUT

      - name: Get md5sum
        id: filehash
        run: |
          echo "egg_hash=$(md5sum ${{ steps.egg.outputs.path }} | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
          echo "whl_hash=$(md5sum ${{ steps.wheel.outputs.path }} | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-py${{ matrix.python-version }}
          path: dist/

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: dist-*
          merge-multiple: true

      - name: List release files
        run: ls -alh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.egg
            artifacts/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
