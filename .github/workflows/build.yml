name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov hypothesis
          pip install "python-telegram-bot>=20.0"
          pip install setuptools

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify egg builds and imports
        run: |
          python setup.py bdist_egg
          # Verify the egg's main module is importable
          python -c "
          import sys, zipfile, os
          egg = [f for f in os.listdir('dist') if f.endswith('.egg')][0]
          sys.path.insert(0, os.path.join('dist', egg))
          from telegramer import common
          print(f'✅ Egg imports OK: {egg}')
          "

  build:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install build dependencies
        run: pip install setuptools build

      - name: Build egg
        run: |
          python setup.py bdist_egg
          ls -alh dist/

      - name: Get egg info
        id: egg
        run: |
          EGG_FILE=$(ls dist/*.egg)
          EGG_NAME=$(basename ${EGG_FILE})
          echo "path=${EGG_FILE}" >> $GITHUB_OUTPUT
          echo "name=${EGG_NAME}" >> $GITHUB_OUTPUT
          echo "tarball=${EGG_NAME}.tar.gz" >> $GITHUB_OUTPUT

      - name: Extract egg and create tar.gz
        run: |
          # Extract the egg (zip) into a directory with the same name
          mkdir -p release/${{ steps.egg.outputs.name }}
          unzip ${{ steps.egg.outputs.path }} -d release/${{ steps.egg.outputs.name }}
          # Create tar.gz that extracts to a directory named like the egg
          cd release
          tar czf ../${{ steps.egg.outputs.tarball }} ${{ steps.egg.outputs.name }}
          cd ..
          ls -alh ${{ steps.egg.outputs.tarball }}
          echo "Contents:"
          tar tzf ${{ steps.egg.outputs.tarball }} | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-py${{ matrix.python-version }}
          path: |
            ${{ steps.egg.outputs.tarball }}
            dist/*.egg

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: dist-*
          merge-multiple: true

      - name: List release files
        run: ls -alh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation (linuxserver/deluge)

            1. Download the `.tar.gz` matching your Python version
            2. Extract into your plugins folder:
               ```bash
               cd ./config/Deluge/plugins/
               tar xzf Telegramer-2.2.0.0-py3.12.egg.tar.gz
               ```
            3. Add to your docker-compose environment:
               ```yaml
               - DOCKER_MODS=linuxserver/mods:universal-package-install
               - INSTALL_PIP_PACKAGES=python-telegram-bot>=20.0
               - PYTHONPATH=/lsiopy/lib/python3.12/site-packages
               ```
            4. Restart the container and enable in Web UI → Preferences → Plugins

            Check your Python version: `docker exec <container> python3 --version`
          files: |
            artifacts/*.tar.gz
            artifacts/*.egg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
